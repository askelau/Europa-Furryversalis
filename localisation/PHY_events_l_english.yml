l_english:
 phy.1.t:0 "The Fate of Phrygia"
 phy.1.d:0 "Our conquests have restored Greek power across the old imperial lands. Some call for the rebirth of Byzantium, others dream of a Macedonian Empire, while some believe Phrygia should remain itself."
 phy.1.a:0 "Restore Byzantium"
 phy.1.b:0 "Proclaim the Macedonian Empire"
 phy.1.c:0 "Phrygia shall remain Phrygia"