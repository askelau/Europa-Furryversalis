l_english:
 mce_prepare_eastern_expedition_title:0 "Prepare the Eastern Expedition"
 mce_prepare_eastern_expedition_desc:0 "Before we march beyond Persia, our armies must be ready for the long campaigns of the east."
 mce_the_antigonids_title:0 "The Antigonids"
 mce_the_antigonids_desc:0 "The Antigonids ruled Macedon and sought mastery over Greece and Asia Minor. Their lands form the western core of our empire."
 mce_the_ptolemies_title:0 "The Ptolemies"
 mce_the_ptolemies_desc:0 "The Ptolemies made Egypt a center of wealth, learning, and Hellenistic rule. Alexandria must once again shine beneath a Macedonian crown."
 mce_the_seleucids_title:0 "The Seleucids"
 mce_the_seleucids_desc:0 "The Seleucids ruled over Syria, Mesopotamia, and Persia. Their eastern kingdom must be restored under our crown."
 mce_unite_successors_title:0 "Unite the Successors"
 mce_unite_successors_desc:0 "Antigonid, Seleucid, and Ptolemaic ambitions must no longer divide the world. Their kingdoms shall be reunited into one empire."
 mce_cross_euphrates_title:0 "Cross the Euphrates"
 mce_cross_euphrates_desc:0 "The Euphrates marks the road into the old imperial heartlands. Beyond it lie Babylon, Persia, and Alexander's greatest victories."
 mce_fall_of_babylon_title:0 "Fall of Babylon"
 mce_fall_of_babylon_desc:0 "Babylon welcomed Alexander as king. By reclaiming it, we restore one of the great capitals of the ancient world."
 mce_burn_persepolis_title:0 "Burn Persepolis"
 mce_burn_persepolis_desc:0 "Persepolis was once the ceremonial heart of the Achaemenid Empire. To rule Persia, we must dominate its ancient centers of power."
 mce_king_of_kings_title:0 "King of Kings"
 mce_king_of_kings_desc:0 "The Persian monarchs called themselves King of Kings. That title now belongs to the ruler of the Macedonian Empire."
 mce_the_empire_of_alexander_title:0 "The Empire of Alexander"
 mce_the_empire_of_alexander_desc:0 "From Greece to Persia, from Egypt to the eastern marches, our empire now rivals the conquests of Alexander himself."
 mce_into_bactria_title:0 "Into Bactria"
 mce_into_bactria_desc:0 "The road east leads through Bactria, where Alexander's soldiers once founded new cities at the edge of the known world."
 mce_sogdiana_secured_title:0 "Sogdiana Secured"
 mce_sogdiana_secured_desc:0 "Sogdiana resisted Alexander fiercely. Securing it will prove that our empire can rule where even great conquerors struggled."
 mce_reach_the_indus_title:0 "Reach the Indus"
 mce_reach_the_indus_desc:0 "The Indus marked the furthest reach of Alexander's armies. We shall march there again and bind the river to our empire."
 mce_beyond_alexander_title:0 "Beyond Alexander"
 mce_beyond_alexander_desc:0 "Alexander's soldiers turned back at the edge of India. We shall go beyond him."
 mce_found_new_alexandrias_title:0 "Found New Alexandrias"
 mce_found_new_alexandrias_desc:0 "Where our banners advance, new cities shall rise as centers of administration, trade, and Hellenistic culture."
 mce_spread_the_koine_title:0 "Spread the Koine"
 mce_spread_the_koine_desc:0 "A common Greek tongue can unite soldiers, merchants, officials, and scholars across the empire."
 mce_fusion_of_cultures_title:0 "Fusion of Cultures"
 mce_fusion_of_cultures_desc:0 "Alexander sought not merely to conquer, but to fuse Greek and Eastern traditions into a new imperial order."
 mce_hellenistic_world_title:0 "Hellenistic World"
 mce_hellenistic_world_desc:0 "The Hellenistic world shall not be a memory of the past, but the foundation of our imperial future."
 mce_royal_roads_title:0 "Royal Roads"
 mce_royal_roads_desc:0 "The old Persian roads carried armies, taxes, and news across the empire. Restoring them will bind our provinces together."
 mce_alexandrias_legacy_title:0 "Alexandria's Legacy"
 mce_alexandrias_legacy_desc:0 "Alexandria became a beacon of knowledge and trade. Our greatest cities must follow its example."
 mce_wealth_of_the_east_title:0 "Wealth of the East"
 mce_wealth_of_the_east_desc:0 "The trade of Egypt, Mesopotamia, Persia, and India will fill our treasuries and enrich our cities."
 mce_special_unit_title:0 "Improve the army"
 mce_special_unit_desc:0 "To sustain our empire, we would need men of quality"

 mce_seleucid_legacy:0 "Seleucid Legacy"
 mce_seleucid_legacy_desc:0 "The eastern successor kingdom has been restored and reorganized under Macedonian rule."
 mce_antigonid_legacy:0 "Antigonid Legacy"
 mce_antigonid_legacy_desc:0 "The western lands of Alexander's empire have been brought beneath our rule."
 mce_ptolemaic_legacy:0 "Ptolemaic Legacy"
 mce_ptolemaic_legacy_desc:0 "Egypt and Alexandria provide wealth, fleets, and learning to our restored empire."
 mce_united_diadochi:0 "United Diadochi"
 mce_united_diadochi_desc:0 "The fractured successor kingdoms have been reunited beneath a single imperial crown."
 mce_euphrates_crossing:0 "Euphrates Crossing"
 mce_euphrates_crossing_desc:0 "Our armies have crossed into the old imperial heartlands with renewed confidence."
 mce_babylon_restored:0 "Babylon Restored"
 mce_babylon_restored_desc:0 "Babylon once again serves as one of the great cities of empire."
 mce_persepolis_avenged:0 "Persepolis Avenged"
 mce_persepolis_avenged_desc:0 "The conquest of Persia has hardened our armies and renewed the legend of Macedonian arms."
 mce_king_of_kings:0 "King of Kings"
 mce_king_of_kings_desc:0 "The titles and institutions of Persia now serve the Macedonian emperor."
 mce_eastern_marches:0 "Eastern Marches"
 mce_eastern_marches_desc:0 "Our eastern provinces supply hardened soldiers for the empire's furthest campaigns."
 mce_sogdian_campaigns:0 "Sogdian Campaigns"
 mce_sogdian_campaigns_desc:0 "The long campaigns of the east have taught our armies to move swiftly through hostile terrain."
 mce_indus_reached:0 "Indus Reached"
 mce_indus_reached_desc:0 "Our arrival at the Indus opens the wealth of India to Macedonian merchants."
 mce_beyond_alexander:0 "Beyond Alexander"
 mce_beyond_alexander_desc:0 "We have surpassed the furthest ambitions of Alexander's army."
 mce_new_alexandrias_modifier:0 "New Alexandrias"
 mce_new_alexandrias_modifier_desc:0 "New cities founded across the empire spread administration, commerce, and Hellenistic culture."
 mce_spread_the_koine:0 "Spread the Koine"
 mce_spread_the_koine_desc:0 "The Greek language binds the empire's many peoples into a shared political world."
 mce_fusion_of_cultures:0 "Fusion of Cultures"
 mce_fusion_of_cultures_desc:0 "Greek and Eastern traditions have fused into a new imperial culture."
 mce_hellenistic_world:0 "Hellenistic World"
 mce_hellenistic_world_desc:0 "The Hellenistic world has been restored and expanded."
 mce_royal_roads_modifier:0 "Royal Roads"
 mce_royal_roads_modifier_desc:0 "Restored roads allow officials, merchants, and armies to move efficiently across the empire."
 mce_alexandrias_legacy:0 "Alexandria's Legacy"
 mce_alexandrias_legacy_desc:0 "Our greatest cities follow Alexandria's example as centers of trade and learning."
 mce_wealth_of_the_east:0 "Wealth of the East"
 mce_wealth_of_the_east_desc:0 "Eastern trade fills our coffers with wealth from distant lands."
 mce_alexander_reborn:0 "Alexander Reborn"
 mce_alexander_reborn_desc:0 "Our empire stands as the living successor to Alexander's conquest."
