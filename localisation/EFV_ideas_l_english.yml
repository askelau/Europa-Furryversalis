  ASY_mountain_churches_desc:0 "Remote churches and monasteries preserve our faith in difficult times."
  ASY_syrian_scriptoria_desc:0 "Syriac scriptoria keep learning, theology and administration alive."
  ASY_upper_tigris_forts_desc:0 "Fortresses along the Upper Tigris defend the approaches to our homeland."
  ASY_border_militias_desc:0 "Local militias guard the frontier and strengthen our armies in war."
  ASY_merchant_diaspora_desc:0 "Assyrian merchants abroad connect us to distant markets and communities."
  ASY_restored_assur_desc:0 "By restoring Assur, we renew the political and spiritual heart of Assyria."