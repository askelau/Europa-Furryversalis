l_english:
  # Phrygia
  PHY_ideas:0 "Phrygian Ideas"
  PHY_ideas_start:0 "Phrygian Traditions"
  PHY_ideas_bonus:0 "Phrygian Ambition"

  phy_thracian_reconquest:0 "Thracian Reconquest"
  phy_thracian_reconquest_desc:0 "The recovery of Thrace secures the European shore of the Bosporus and strengthens our position in the region."

  phy_hellenic_revival:0 "Hellenic Revival"
  phy_hellenic_revival_desc:0 "The Greek cities of Anatolia have endured centuries of foreign rule. Through patronage and settlement we shall ensure the revival of Hellenic culture throughout the region."

  phy_anatolian_estates:0 "Anatolian Estates"
  phy_anatolian_estates_desc:0 "The cooperation of local elites is vital for maintaining order throughout Anatolia."

  phy_phrygian_cavalry:0 "Phrygian Cavalry"
  phy_phrygian_cavalry_desc:0 "The horsemen of western Anatolia have long served in the armies of kings and emperors alike."

  phy_rebirth_of_sardis:0 "Rebirth of Sardis"
  phy_rebirth_of_sardis_desc:0 "Once among the richest cities of the ancient world, Sardis shall flourish again under our rule."

  phy_aegean_trade:0 "Aegean Trade"
  phy_aegean_trade_desc:0 "The ports of the Aegean connect Europe and Asia, bringing wealth and prosperity to our realm."

  phy_heirs_of_the_diadochi:0 "Heirs of the Diadochi"
  phy_heirs_of_the_diadochi_desc:0 "The successor kings of Alexander carved great realms from his empire. Their legacy lives on in us."

l_english:
  # Macedonia
  MCD_ideas:0 "Macedonian Ideas"
  MCD_ideas_start:0 "Macedonian Traditions"
  MCD_ideas_bonus:0 "Macedonian Ambition"

  mcd_companion_cavalry:0 "Companion Cavalry"
  mcd_companion_cavalry_desc:0 "The Companion Cavalry formed the elite striking force of Alexander's armies. Their discipline and mobility remain a model for our mounted warriors."

  mcd_phalanx_legacy:0 "Legacy of the Phalanx"
  mcd_phalanx_legacy_desc:0 "The Macedonian phalanx transformed warfare across the ancient world. Its traditions still inspire our soldiers."

  mcd_alexanders_memory:0 "Alexander's Memory"
  mcd_alexanders_memory_desc:0 "The memory of Alexander's conquests commands respect throughout the world and lends legitimacy to our ambitions."

  mcd_royal_settlements:0 "Royal Settlements"
  mcd_royal_settlements_desc:0 "The kings of Macedon founded cities and colonies throughout their realm. Encouraging settlement will strengthen our kingdom."

  mcd_hegemon_of_hellas:0 "Hegemon of Hellas"
  mcd_hegemon_of_hellas_desc:0 "By leading the Greek peoples we can once again establish Macedon as the foremost power of the Hellenic world."

  mcd_military_engineers:0 "Military Engineers"
  mcd_military_engineers_desc:0 "The armies of Alexander excelled in siegecraft and engineering. We shall continue this tradition."

  mcd_successors_of_pella:0 "Successors of Pella"
  mcd_successors_of_pella_desc:0 "Pella was once the center of a world-spanning empire. Its legacy inspires new generations to serve the realm."

l_english:
  # Macedonian Empire
  MCE_ideas:0 "Macedonian Imperial Ideas"
  MCE_ideas_start:0 "Imperial Traditions"
  MCE_ideas_bonus:0 "Imperial Ambition"

  mce_alexanders_dream:0 "Alexander's Dream"
  mce_alexanders_dream_desc:0 "Alexander dreamed of an empire stretching across Europe, Asia, and Africa. We shall make that dream eternal."

  mce_imperial_bureaucracy:0 "Imperial Bureaucracy"
  mce_imperial_bureaucracy_desc:0 "A vast empire cannot be ruled by conquest alone. Governors, scribes, and officials must bind our lands together."

  mce_royal_companions:0 "Royal Companions"
  mce_royal_companions_desc:0 "The Companions were the hammer of Macedon. Their legacy lives on in our elite cavalry."

  mce_phalanx_reforms:0 "Phalanx Reforms"
  mce_phalanx_reforms_desc:0 "The phalanx once broke the armies of kings. With reform and discipline, it shall dominate the battlefield again."

  mce_new_alexandrias:0 "New Alexandrias"
  mce_new_alexandrias_desc:0 "Wherever our banners advance, cities shall rise as centers of Greek culture, trade, and administration."

  mce_crossroads_of_the_world:0 "Crossroads of the World"
  mce_crossroads_of_the_world_desc:0 "Our empire sits between the Aegean, Anatolia, Egypt, Persia, and India. The wealth of the world flows through our markets."

  mce_universal_empire:0 "Universal Empire"
  mce_universal_empire_desc:0 "Greeks, Anatolians, Persians, Egyptians, and countless others may all serve beneath one imperial crown."

