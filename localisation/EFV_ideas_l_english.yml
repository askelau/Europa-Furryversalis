  BNH_monastic_scholarship_desc:0 "The monasteries of Mesopotamia preserve ancient learning and educate generations of scholars."

  BNH_syriac_literature_desc:0 "Our scribes continue the long literary traditions of the Syriac language."

  BNH_church_of_the_east_desc:0 "The Christian communities of Mesopotamia provide unity and stability throughout the realm."

  BNH_crossroads_of_nations_desc:0 "Trade routes from Anatolia, Persia and Arabia meet within our lands."

  BNH_mesopotamian_fortresses_desc:0 "Strong fortifications defend the fertile lands between the rivers."

  BNH_aramaic_administration_desc:0 "An experienced administrative class allows us to govern efficiently."

  BNH_ancient_learning_centers_desc:0 "The schools and monasteries of Mesopotamia attract scholars from across the East."


