  BAB_legacy_of_hammurabi_desc:0 "The ancient laws of Babylon remain a symbol of order and justice."

  BAB_canals_of_mesopotamia_desc:0 "Irrigation canals transform the fertile lands between the rivers."

  BAB_ancient_bureaucracy_desc:0 "The administrative traditions of Mesopotamia stretch back thousands of years."

  BAB_astronomical_traditions_desc:0 "Babylonian astronomers were among the finest of the ancient world."

  BAB_fertile_crescent_desc:0 "The rich soil of Mesopotamia supports a prosperous population."

  BAB_imperial_capitals_desc:0 "The great cities of Babylon and Baghdad inspire respect throughout the region."

  BAB_rebuilders_of_babylon_desc:0 "We shall restore the splendor of ancient Babylon."


