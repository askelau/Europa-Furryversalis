  SDN_old_harbor_desc:0 "Sidon's ancient harbor has long sheltered merchants, fishermen and warships alike."
  SDN_purple_dyers_desc:0 "Our dyers preserve the secret craft of producing the famous royal purple."
  SDN_city_of_glass_desc:0 "Sidonian glassmakers are renowned for their skill and fine craftsmanship."
  SDN_mercantile_council_desc:0 "The city's leading merchant families guide policy through a powerful council."
  SDN_levantic_diplomacy_desc:0 "Surrounded by greater powers, Sidon survives through careful diplomacy."
  SDN_coastal_walls_desc:0 "Strong coastal walls protect our city from raids and sieges."
  SDN_cypriot_routes_desc:0 "Our ships maintain profitable routes between the Levant and Cyprus."

  

