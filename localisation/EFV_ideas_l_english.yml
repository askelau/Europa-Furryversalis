  PHO_purple_trade_desc:0 "The famous purple dye of Phoenicia remains a symbol of wealth and prestige."

  PHO_mediterranean_colonies_desc:0 "The sea is our highway and distant shores our opportunity."

  PHO_levantine_ports_desc:0 "The harbors of the Levant connect the markets of three continents."

  PHO_merchant_fleets_desc:0 "A strong merchant fleet secures our prosperity."

  PHO_cosmopolitan_cities_desc:0 "People from many lands gather in our cities."

  PHO_seafaring_traditions_desc:0 "Generations of sailors have mastered the waters of the Mediterranean."


